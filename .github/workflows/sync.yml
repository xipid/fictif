name: Build and Sync

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Commit dist back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync production build [skip ci]"
          file_pattern: 'dist/**'
          add_options: '-f'
